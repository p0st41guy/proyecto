<body>

    <div class="card">

            <p>Ingresa tus credenciales institucionales.</p>
            <input type="email" id="login-email" placeholder="Correo Personal">
            
            <div class="password-container">
                <input type="password" id="login-pass" placeholder="Contraseña">
                <span class="toggle-eye" onclick="togglePassword('login-pass', this)">👁️</span>
            </div>

            <button onclick="login()">Iniciar Sesión</button>
            <div class="links" onclick="mostrarVista('view-register')">¿No tienes cuenta? <b>Regístrate aquí</b></div>
            <div class="links" onclick="mostrarVista('view-forgot')" style="color: #666;">Olvidé mi contraseña</div>
        </div>
        
<!-- VISTA: REGISTRO -->
        <form action="crear_cuenta.php" method="POST" id="form-registro">
            <div id="view-register" class="hidden">
                <h2>Crear Cuenta</h2>
                <p>Únete al sistema del ITA.</p>
                
                <!-- Límites de 3 a 30 caracteres para el nombre -->
                <input type="text" name="nombre" id="reg-nombre" placeholder="Nombre Completo" minlength="3" maxlength="30" autocomplete="off">
                
                <!-- Límite de 50 caracteres -->
                <input type="email" name="correo" id="reg-email" placeholder="Correo Institucional" maxlength="50">
                <span id="email-error" class="error-text text-weak"></span>

                <!-- Límite estricto de 10 dígitos para el número -->
                <input type="tel" name="telefono" id="reg-tel" placeholder="Número de Teléfono (10 dígitos)" maxlength="10" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                
                <input list="escuelas-hidalgo" name="escuela" id="reg-escuela" placeholder="Escuela de Procedencia" oninput="handleSchoolInput(this)" maxlength="60">
                <datalist id="escuelas-hidalgo">
                    <option value="CETis No. 26">

                    <option value="COBAEH – Plantel Atitalaquia">
                    <option value="Preparatoria Oficial de Tula">
                    <option value="COBAEH – Plantel Tula">
                    <option value="Preparatoria Federal por Cooperación “Melchor Ocampo”">
                    <option value="Preparatoria Particular “Sor Juana Inés de la Cruz”">
                    <option value="Preparatoria Oficial de Mixquiahuala">
                    <option value="COBAEH – Plantel Mixquiahuala">
                    <option value="Preparatoria Particular “José María Morelos y Pavón”">
                    <option value="Preparatoria Particular “Guillermo Rossell”">
                    <option value="Preparatoria Oficial de Ixmiquilpan">
                    <option value="COBAEH – Plantel Ixmiquilpan">
                    <option value="Preparatoria Particular “Benito Juárez”">
                    <option value="Preparatoria Particular “Sor Juana Inés de la Cruz” (Ixmiquilpan)">
                    <option value="Preparatoria Oficial de Actopan">
                    <option value="COBAEH – Plantel Actopan">
                    <option value="Preparatoria Particular “José Vasconcelos”">
                    <option value="Preparatoria Oficial de Chilcuautla">
                    <option value="COBAEH – Plantel Chilcuautla">
                    <option value="CECyTE – Plantel Tetepango">
                    <option value="CECyTE – Plantel Atitalaquia">
                    <option value="Preparatoria Oficial de Alfajayucan">
                    <option value="COBAEH – Plantel Alfajayucan">
                    <option value="Preparatoria Oficial de El Cardonal">
                    <option value="COBAEH – Plantel El Cardonal">
                    <option value="Preparatoria Oficial de Tasquillo">
                    <option value="COBAEH – Plantel Tasquillo">
                    <option value="Preparatoria Oficial de Huichapan">
                    <option value="COBAEH – Plantel Huichapan">
                    <option value="Preparatoria Oficial de Tezontepec de Aldama">
                    <option value="COBAEH – Plantel Tezontepec de Aldama">
                    <option value="Preparatoria Oficial de Nopala">
                    <option value="COBAEH – Plantel Nopala">
                    <option value="Preparatoria Oficial de Zimapán">
                    <option value="CETis No. 91">
                    <option value="Universidad Autónoma del Estado de Hidalgo – Plantel Atotonilco de Tula">
                    <option value="Escuela Superior de Atotonilco de Tula, Hgo.">
                    <option value="Preparatoria Oficial de Chapantongo">
                    <option value="COBAEH – Plantel Chapantongo">
                    <option value="Preparatoria Oficial de Ajacuba">
                    <option value="COBAEH – Plantel Ajacuba">
                    <option value="Preparatoria Oficial de San Agustín Tlaxiaca">
                    <option value="COBAEH – Plantel San Agustín Tlaxiaca">
                    <option value="Preparatoria Oficial de Francisco I. Madero">
                    <option value="COBAEH – Plantel Francisco I. Madero">
                    <option value="Preparatoria Oficial de Tlaxcoapan">
                    <option value="COBAEH – Plantel Tlaxcoapan">

                </datalist>

                <div id="extra-school-info">
                    <input type="text" id="reg-otra-escuela" placeholder="Nombre o Clave de la escuela" maxlength="60">
                </div>

                <!-- Contraseña con límites (6 a 20) e ícono SVG -->
                <div class="password-container">
                    <input type="password" name="clave" id="reg-pass" placeholder="Contraseña (mín. 6)" minlength="6" maxlength="20">
                    <span class="toggle-eye" onclick="togglePassword('reg-pass', this)">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    </span>
                </div>
                <div class="strength-meter"><div id="strength-bar"></div></div>
                <span id="pass-error" class="error-text"></span>

                <!-- Confirmar Contraseña -->
                <div class="password-container">
                    <input type="password" id="reg-pass-conf" placeholder="Confirmar Contraseña" maxlength="20">
                    <span class="toggle-eye" onclick="togglePassword('reg-pass-conf', this)">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    </span>

                <button type="button" id="btn-registrar" onclick="procesoRegistro()">Continuar</button>

        <!-- VISTA: VERIFICAR CÓDIGO -->
        <div id="view-verify" class="hidden">
            <h2>Verifica tu Correo</h2>
            <p>Escribe el código de 6 dígitos.</p>
            <input type="number" id="input-codigo" placeholder="000000">
            <button onclick="confirmarCodigo()">Verificar e Ingresar</button>
        </div>
        
        <!-- VISTA: RECUPERAR -->
        <div id="view-forgot" class="hidden">
            <h2>Recuperar</h2>
            <input type="email" id="forgot-email" placeholder="Escribe tu correo">
            <button onclick="recuperarPass()">Enviar Código</button>
            <div class="links" onclick="mostrarVista('view-login')">Regresar</div>
        </div>

        <!-- VISTA: NUEVA CONTRASEÑA -->
        <div id="view-new-pass" class="hidden">
            <h2>Nueva Contraseña</h2>
            <div class="password-container">
                <input type="password" id="new-pass" placeholder="Nueva Contraseña">
                <span class="toggle-eye" onclick="togglePassword('new-pass', this)">👁️</span>
            </div>
            <div class="password-container" style="margin-top: 10px;">
                <input type="password" id="new-pass-conf" placeholder="Confirmar">
                <span class="toggle-eye" onclick="togglePassword('new-pass-conf', this)">👁️</span>
            </div>
            <button onclick="guardarNuevaPass()" style="margin-top: 15px;">Actualizar Datos</button>
        </div>
    </div>

    <!-- CONEXIÓN AL NUEVO ARCHIVO JS -->
    <script src="validaciones.js"></script>
</body>
</html>

    <script>
        const PUBLIC_KEY = "2SUvMS3C3ezFvL5SM"; 
        const SERVICE_ID = "service_fpe7hsg";    
        const TEMPLATE_ID = "template_k5qb5bi"; 
        
        emailjs.init(PUBLIC_KEY);

        let codigoGenerado = null;
        let datosTemporales = {};
        let modoRecuperacion = false;

        // --- SISTEMA DE NOTIFICACIONES ANIMADAS ---
        function notify(mensaje, tipo = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${tipo}`;
            toast.innerHTML = `<span>${tipo === 'error' ? '⚠️' : '✅'}</span> ${mensaje}`;
            
            container.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = "fadeOut 0.5s ease forwards";
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        // Lógica de autocompletado y animación de escuela
        function handleSchoolInput(input) {
            const extra = document.getElementById('extra-school-info');
            if (input.value === "Otra escuela...") {
                extra.classList.add('show');
            } else {
                extra.classList.remove('show');
            }
        }

        function mostrarVista(id) {
            document.querySelectorAll('.card div').forEach(v => v.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function validarPassword() {
            const p = document.getElementById('reg-pass');
            const c = document.getElementById('reg-pass-conf');
            p.className = p.value.length >= 6 ? "input-success" : "input-error";
            if(c.value) c.className = (c.value === p.value) ? "input-success" : "input-error";
        }

        function login() {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;

            fetch("login.php", {
                method: "POST",
                headers: {
                    "Content-Type": "application/x-www-form-urlencoded"
                },
                body: `correo=${encodeURIComponent(email)}&clave=${encodeURIComponent(pass)}`
            })
            .then(res => res.text())
            .then(data => {
                if (data.trim() === "ok") {
                    notify("Ingreso exitoso", "success");
                    setTimeout(() => window.location.href = "preguntas.html", 1000);
                } else {
                    notify("Credenciales incorrectas", "error");
                }
            })
            .catch(() => {
                notify("Error de conexión", "error");
            });
        }

       function procesoRegistro() {
    const email = document.getElementById('reg-email').value;
    const pass = document.getElementById('reg-pass').value;
    const conf = document.getElementById('reg-pass-conf').value;
    const escuelaSel = document.getElementById('reg-escuela').value;
    const otraEscuela = document.getElementById('reg-otra-escuela').value;
    
    // 1. Capturamos el número y le damos formato
    let telefono = document.getElementById('reg-tel').value.trim();
    
    if (telefono) {
        // Le quitamos espacios o guiones por si el usuario los puso
        telefono = telefono.replace(/[\s-]/g, '');
        // Si no empieza con +52 ni con 52, le agregamos el +52
        if (!telefono.startsWith('+52') && !telefono.startsWith('52')) {
            telefono = '+52' + telefono;
        } else if (telefono.startsWith('52')) {
            // Si solo puso 52, le agregamos el + para que sea +52
            telefono = '+' + telefono;
        }
    }

    let escuelaFinal = (escuelaSel === "Otra escuela...") ? otraEscuela : escuelaSel;
    
    if (!email || !escuelaFinal || pass !== conf || pass.length < 6) {
        notify("Verifica los datos", "error");
        return;
    }

    mostrarVista('view-verify');

    // Envío silencioso a la base de datos
    const form = document.querySelector("form");
    const formData = new FormData(form);

    fetch("crear_cuenta.php", {
        method: "POST",
        body: formData
    })
    .then(response => response.text())
    .then(data => {
        if (data.trim() !== "ok") {
            console.error("Error BD:", data);
        }
    });

    // Generar código aleatorio
    codigoGenerado = Math.floor(100000 + Math.random() * 900000);
    datosTemporales = { 
        nombre: document.getElementById('reg-nombre').value, 
        email,
        telefono,
        escuela: escuelaFinal,
        pass 
    };
    
    notify("Enviando códigos de acceso...");

    // --- ENVIAR POR CORREO ---
    emailjs.send(SERVICE_ID, TEMPLATE_ID, {
        to_email: email,
        nombre_usuario: datosTemporales.nombre,
        codigo_random: codigoGenerado
    }).then(() => {
        notify("Código enviado al correo 📧", "success");
        mostrarVista('view-verify');
    });

    // --- ENVIAR POR WHATSAPP ---
    if (telefono) {
        const params = new URLSearchParams();
        params.append('telefono', telefono);
        params.append('codigo', codigoGenerado);

        fetch("enviar_whatsapp.php", {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded"
            },
            body: params.toString()
        })
        .then(res => res.text())
        .then(resData => {
            console.log("Respuesta del servidor PHP (WhatsApp):", resData);
            
            // Si el PHP dice "ok", lanzamos la notificación de WhatsApp
            if (resData.trim() === "ok") {
                notify("El mensaje fue enviado por WhatsApp 📱", "success");
            } else {
                // Si hay un error, nos avisará en pantalla para saber qué pasó
                notify("Error al enviar WhatsApp", "alerta");
            }
        })
        .catch(err => {
            console.error("Error en la petición de WhatsApp:", err);
            notify("No se pudo conectar con el servidor de WhatsApp", "error");
        });
    }
}

        function confirmarCodigo() {

            const val = document.getElementById('input-codigo').value;
            if (val == codigoGenerado) {
                if(modoRecuperacion) {
                    mostrarVista('view-new-pass');
                } else {
                    localStorage.setItem('usuarioActivo', JSON.stringify(datosTemporales));
                    notify("Cuenta creada con éxito", "success");
                    setTimeout(() => window.location.href = "preguntas.html", 1500);
                }
            } else {
                notify("Código incorrecto", "error");
            }
        }

        function recuperarPass() {
            const email = document.getElementById('forgot-email').value;

            fetch("verificar_correo.php", {
                method: "POST",
                headers: {
                    "Content-Type": "application/x-www-form-urlencoded"
                },
                body: `correo=${encodeURIComponent(email)}`
            })
            .then(res => res.text())
            .then(data => {
                if (data.trim() === "ok") {
                    modoRecuperacion = true;
                    codigoGenerado = Math.floor(100000 + Math.random() * 900000);
                    datosTemporales.email = email;

                    notify("Enviando código...");

                    emailjs.send(SERVICE_ID, TEMPLATE_ID, {
                        to_email: email,
                        nombre_usuario: "Usuario",
                        codigo_random: codigoGenerado
                    }).then(() => {
                        notify("Código enviado", "success");
                        mostrarVista('view-verify');
                    });
                } else {
                    notify("El correo no existe en la base de datos", "error");
                }
            })
            .catch(() => {
                notify("Error de conexión", "error");
            });
        }

        function guardarNuevaPass() {
            const p1 = document.getElementById('new-pass').value;
            const p2 = document.getElementById('new-pass-conf').value;

            if (p1 === p2 && p1.length >= 6) {
                fetch("actualizar_password.php", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/x-www-form-urlencoded"
                    },
                    body: `correo=${encodeURIComponent(datosTemporales.email)}&clave=${encodeURIComponent(p1)}`
                })
                .then(res => res.text())
                .then(data => {
                    if (data.trim() === "ok") {
                        notify("Contraseña actualizada", "success");
                        setTimeout(() => window.location.href = "inicio.html", 1000);
                    } else {
                        notify("Error al actualizar", "error");
                    }
                })
                .catch(() => {
                    notify("Error de conexión", "error");
                });
            } else {
                notify("Error en contraseñas", "error");
            }
        }
    </script>
</body>
